name: CI

on:
  push:
    branches: [ master, main, reconstruct/tableview-only ]
  pull_request:
    branches: [ master, main, reconstruct/tableview-only ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache target directory
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-target-clippy-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache target directory
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-target-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Run lib tests
        run: cargo test --lib
      - name: Run integration tests (CRITICAL - tests blawktrust API surface)
        run: cargo test --test blawktrust_api_integration

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache target directory
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-target-build-${{ hashFiles('**/Cargo.lock') }}
      - name: Build library
        run: cargo build --lib --release
      - name: Build binary
        run: cargo build --bin blisp --release
      - name: Build all targets
        run: cargo build --all-targets

  # Smoke test with actual BLISP binary
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache target directory
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-target-build-${{ hashFiles('**/Cargo.lock') }}
      - name: Build BLISP
        run: cargo build --release --bin blisp
      - name: Test orientation smoke test
        run: |
          cat > test_orientation.lisp << 'EOF'
          (defparameter df (stdin))
          (print (sum df))
          (print (sum (o 'Z df)))
          (print (sum (o 'R df)))
          EOF
          echo -e "a;b\n1;2\n3;4" | ./target/release/blisp test_orientation.lisp

  # Tripwire: prevent silent growth of ignored tests
  check-ignored-tests:
    name: Check Ignored Test Count
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Count ignored tests
        run: |
          IGNORED_COUNT=$(grep -r "#\[ignore" tests/ --include="*.rs" | wc -l)
          echo "Current ignored test count: $IGNORED_COUNT"
          echo "Baseline: 15 (see IGNORED_TESTS.md)"
          if [ "$IGNORED_COUNT" -gt 15 ]; then
            echo "❌ ERROR: Ignored test count increased from 15 to $IGNORED_COUNT"
            echo "Action required:"
            echo "  1. Fix the tests to remove #[ignore], OR"
            echo "  2. Update IGNORED_TESTS.md with justification and new baseline"
            echo "  3. Update this check's baseline threshold"
            exit 1
          elif [ "$IGNORED_COUNT" -lt 15 ]; then
            echo "✅ Great! Ignored count decreased to $IGNORED_COUNT"
            echo "Please update IGNORED_TESTS.md and this check's baseline"
          else
            echo "✅ Ignored test count matches baseline: $IGNORED_COUNT"
          fi

  # Final gate: everything must pass
  ci-success:
    name: CI Success
    needs: [fmt, clippy, test, build, smoke-test, check-ignored-tests]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "All CI checks passed successfully"
