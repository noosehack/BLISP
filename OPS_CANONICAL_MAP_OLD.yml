# ==============================================================================
# Migration Priority Buckets
# ==============================================================================
#
# A1_fusion_critical: Move to IR first (unlock real fusion)
#   - Elementwise: add, sub, mul, div, log, exp, abs, neg
#   - Shifts: dlog, shift, diff
#   - Rolling: rolling-mean, rolling-std, rolling-min/max
#   - Masks: wkd
#   - Aggregations: sum, mean, std (for rolling composition)
#
# A2_planner_structural: Move after A1 (enable rewrites)
#   - select, with, rename, join, group, sort, asof
#   - Composite: ur, wzs, xminus
#
# A3_edge_io: Keep as legacy wrappers longer
#   - file, save, stdin, print
#   - Utility: type-of, len
#
# ==============================================================================
# Naming Rules (L1: User-Facing Aliases)
# ==============================================================================
#
# 1. Verb-first: rolling-mean, shift, weekday, dropna
# 2. Dash-separated (no underscores)
# 3. No abbreviations unless standard (std, abs, exp, log)
# 4. Avoid overloading: different semantics = different name
# 5. Prefer descriptive over terse: rolling-mean vs rm
#
# ==============================================================================
# Legacy Token Rules (L2: Backward Compat)
# ==============================================================================
#
# 1. Legacy tokens map many-to-one onto canonical IDs
# 2. Deprecated tokens emit warnings (e.g., dlog-col)
# 3. Aliases are allowed (e.g., w5 → wkd)
# 4. Canonical never depends on legacy tokens
#
# ==============================================================================
